<style>
/* ═══════════════════════════════════════════
   Design System — edit :root to change theme
   ═══════════════════════════════════════════ */
:root {
  --bg-primary: #ffffff;
  --bg-secondary: #f5f5f7;
  --bg-tertiary: #fbfbfd;
  --bg-grouped: #f2f2f7;
  --bg-elevated: #ffffff;
  --text-primary: #1d1d1f;
  --text-secondary: #86868b;
  --text-tertiary: #aeaeb2;
  --accent: #0071e3;
  --accent-hover: #0077ed;
  --tint-red: #ff3b30;
  --tint-orange: #ff9500;
  --tint-green: #34c759;
  --tint-blue: #007aff;
  --tint-purple: #af52de;
  --tint-pink: #ff2d55;
  --separator: rgba(60, 60, 67, .12);
  --shadow-sm: 0 1px 3px rgba(0,0,0,.06), 0 1px 2px rgba(0,0,0,.04);
  --shadow-md: 0 4px 14px rgba(0,0,0,.08);
  --shadow-lg: 0 8px 30px rgba(0,0,0,.12);
  --radius-sm: 8px;
  --radius-md: 12px;
  --radius-lg: 16px;
  --radius-xl: 20px;
  --safe-top: env(safe-area-inset-top, 0px);
  --safe-bottom: env(safe-area-inset-bottom, 0px);
}
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "SF Pro Text", "SF Pro Display",

  line-height: 1.47059;
  letter-spacing: -0.01em;
}
a { color: var(--accent); text-decoration: none; }
a:hover { text-decoration: underline; }

/* ── Map ── */
#map { width: 100%; height: 40vh; min-height: 280px; position: sticky; top: 0; z-index: 100; background: #eee; }
.locate-btn {

}
.locate-btn.active { color: #007aff; }
.amap-fail {

  font-size:13px; color:var(--text-secondary); z-index: 50;
}
.amap-fail b { color: var(--text-primary); font-size:15px; }

/* ── Tabs ── */
.tabs {
  display: flex; gap: 6px; padding: 12px 16px; overflow-x: auto; -webkit-overflow-scrolling: touch;
  background: rgba(255,255,255,.85); -webkit-backdrop-filter: saturate(180%) blur(20px);
  backdrop-filter: saturate(180%) blur(20px); position: sticky; top: 40vh; z-index: 99;
  border-bottom: .5px solid var(--separator); scrollbar-width: none;
}
.tabs::-webkit-scrollbar { display: none; }
.tab {
  flex-shrink: 0; padding: 7px 16px; border-radius: 980px; border: none;
  background: var(--bg-grouped); color: var(--text-secondary);
  font-size: 14px; font-weight: 500; cursor: pointer; transition: all .25s ease;
  white-space: nowrap; letter-spacing: -0.01em;
}
.tab:active { transform: scale(.96); }
.tab.active { background: var(--accent); color: #fff; }

/* ── Main content ── */
.content { max-width: 680px; margin: 0 auto; padding: 16px 16px calc(24px + var(--safe-bottom)); }

/* ── Overview ── */
.hero { text-align: center; padding: 28px 20px 20px; }
.hero h1 { font-size: 26px; font-weight: 700; letter-spacing: -0.02em; line-height: 1.2; }
.hero .subtitle { font-size: 16px; color: var(--text-secondary); margin-top: 6px; font-weight: 400; }
.info-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 20px; }
.info-card { background: var(--bg-elevated); border-radius: var(--radius-lg); padding: 16px; box-shadow: var(--shadow-sm); }
.info-card .label { font-size: 12px; font-weight: 600; color: var(--text-secondary); text-transform: uppercase; letter-spacing: .02em; margin-bottom: 6px; }
.info-card .value { font-size: 14px; font-weight: 600; line-height: 1.4; }

/* ── Section headers ── */
.section-head { font-size: 13px; font-weight: 600; color: var(--text-secondary); text-transform: uppercase; letter-spacing: .03em; padding: 20px 0 8px; }

/* ── Day header ── */
.day-head { padding: 20px 0 12px; }
.day-head h2 { font-size: 22px; font-weight: 700; letter-spacing: -0.02em; }
.day-head p { font-size: 15px; color: var(--text-secondary); margin-top: 2px; }

/* ── Route bar ── */
.route-bar { background: var(--bg-elevated); border-radius: var(--radius-md); padding: 12px 14px; margin-bottom: 14px; box-shadow: var(--shadow-sm); font-size: 13px; color: var(--text-secondary); line-height: 1.7; white-space: pre-line; }
.route-bar strong { color: var(--text-primary); }

/* ── Timeline ── */
.timeline { position: relative; padding-left: 24px; }
.timeline::before { content: ''; position: absolute; left: 7px; top: 20px; bottom: 20px; width: 1.5px; background: var(--separator); }
.tl-item { position: relative; margin-bottom: 10px; }
.tl-dot { position: absolute; left: -20px; top: 18px; width: 10px; height: 10px; border-radius: 50%; z-index: 1; box-shadow: 0 0 0 3px var(--bg-secondary); }
.tl-dot.food { background: var(--tint-red); }
.tl-dot.spot { background: var(--tint-blue); }
.tl-dot.hotel { background: var(--tint-orange); }
.tl-dot.drink { background: var(--tint-purple); }
.tl-dot.transport { background: var(--text-tertiary); }

/* ── Card ── */
.card { background: var(--bg-elevated); border-radius: var(--radius-md); padding: 14px 16px; box-shadow: var(--shadow-sm); transition: box-shadow .25s ease; cursor: pointer; }
.card:active { box-shadow: var(--shadow-md); }
.card .time { font-size: 12px; font-weight: 600; color: var(--text-tertiary); letter-spacing: .01em; }
.card .name { font-size: 17px; font-weight: 600; margin: 2px 0 4px; letter-spacing: -0.01em; display: flex; align-items: center; gap: 6px; }
.card .desc { font-size: 14px; color: var(--text-secondary); line-height: 1.45; }

/* Badge */
.badge { display: inline-flex; align-items: center; font-size: 11px; font-weight: 700; padding: 1px 7px; border-radius: 4px; }
.badge.food { background: rgba(255,59,48,.1); color: var(--tint-red); }
.badge.spot { background: rgba(0,122,255,.1); color: var(--tint-blue); }
.badge.drink { background: rgba(175,82,222,.1); color: var(--tint-purple); }
.badge.hotel { background: rgba(255,149,0,.1); color: var(--tint-orange); }

/* Budget */
.budget { display: inline-block; margin-top: 6px; padding: 3px 10px; background: var(--bg-grouped); border-radius: var(--radius-sm); font-size: 12px; color: var(--text-secondary); font-weight: 500; }

/* Reservation warning chip */
.rsv-warn { display: inline-flex; align-items: center; gap:4px; margin-top: 6px; padding: 3px 10px; background: rgba(255,149,0,.1); color: var(--tint-orange); border-radius: var(--radius-sm); font-size: 12px; font-weight: 600; }

/* Links row */
.links { display: flex; gap: 8px; margin-top: 10px; flex-wrap: wrap; }
.btn {

  padding: 8px 14px; border-radius: var(--radius-sm);

.btn:active { filter: brightness(.9); }
.btn.nav { background: var(--accent); color: #fff; }
.btn.xhs { background: #ff2442; color: #fff; }
.btn.dp { background: #ffa700; color: #fff; }
.btn.rsv { background: var(--tint-green); color: #fff; }

/* Action Sheet */
.as-overlay {
  position: fixed; inset: 0; z-index: 9999;
  background: rgba(0,0,0,.35); backdrop-filter: blur(2px);
  display: flex; align-items: flex-end; justify-content: center;
  opacity: 0; pointer-events: none; transition: opacity .25s;
}
.as-overlay.show { opacity: 1; pointer-events: auto; }
.as-sheet {
  width: 100%; max-width: 420px;
  padding: 0 8px 34px;
  transform: translateY(100%); transition: transform .3s cubic-bezier(.22,1,.36,1);
}
.as-overlay.show .as-sheet { transform: translateY(0); }
.as-group {
  background: rgba(255,255,255,.88); backdrop-filter: blur(20px);
  border-radius: 14px; overflow: hidden; margin-bottom: 8px;

.as-group .as-item {
  display: flex; align-items: center; justify-content: center; gap: 8px;
  padding: 16px; font-size: 18px; color: #007aff; font-weight: 500;
  border: none; background: none; width: 100%; cursor: pointer;
  -webkit-tap-highlight-color: transparent;
}
.as-group .as-item + .as-item { border-top: .5px solid rgba(0,0,0,.12); }
.as-group .as-item:active { background: rgba(0,0,0,.06); }
.as-cancel { font-weight: 600; }

/* Details — default open */
.details {
  margin-top: 10px; padding-top: 10px;
  border-top: .5px solid var(--separator);
  font-size: 13px; color: var(--text-secondary); line-height: 1.6;
}
.details.closed { display: none; }

/* ── Overview day list ── */
.day-list .card { margin-bottom: 8px; }
.day-list .card .dot { display: inline-block; width: 8px; height: 8px; border-radius: 50%; margin-right: 6px; }

/* ── Booking checklist ── */
.pay-summary { background: var(--bg-elevated); border-radius: var(--radius-md); padding: 14px 16px; box-shadow: var(--shadow-sm); font-size: 13px; line-height: 1.7; margin-bottom: 10px; }
.pay-summary h4 { font-size: 14px; font-weight: 700; margin-bottom: 4px; display:flex; align-items:center; gap:6px; }
.pay-summary .warn { color: var(--tint-red); }
.pay-summary .ok-text { color: var(--tint-green); }
.pay-summary table { width:100%; border-collapse: collapse; margin-top: 4px; }
.pay-summary td { padding: 5px 0; border-top: .5px solid var(--separator); vertical-align: top; }
.pay-summary td:first-child { font-weight:600; white-space:nowrap; padding-right:10px; color:var(--text-primary); }

/* ── Legend ── */
.legend { display: flex; gap: 14px; flex-wrap: wrap; padding: 8px 0; font-size: 12px; color: var(--text-secondary); }
.legend-item { display: flex; align-items: center; gap: 5px; }
.legend-dot { width: 8px; height: 8px; border-radius: 50%; }

/* ── AMap overrides ── */
.amap-info-content { font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", sans-serif !important; font-size: 13px !important; line-height: 1.6 !important; padding: 2px !important; }
.amap-info-content b { font-size: 14px; }
.amap-info-content a { color: var(--accent) !important; }
.amap-logo, .amap-copyright { opacity: .55; }

/* ── Edit mode ── */
.edit-toggle { margin-left: auto; background: var(--tint-orange); color: #fff; font-weight: 700; }
.edit-toggle.active { background: var(--tint-red); }
.edit-banner { background: rgba(255,149,0,.12); color: #b25f00; border-radius: var(--radius-md); padding: 10px 14px; font-size: 12.5px; line-height: 1.6; margin-bottom: 14px; }
.edit-day-head { display: flex; flex-direction: column; gap: 6px; padding: 16px 0 12px; }
.edit-card { cursor: default; }
.edit-row { margin-bottom: 8px; }
.ed-input { width: 100%; border: 1px solid var(--separator); border-radius: 8px; padding: 8px 10px; font-size: 14px; font-family: inherit; background: var(--bg-grouped); color: var(--text-primary); }
textarea.ed-input { min-height: 56px; resize: vertical; }
.ed-row2 { display: flex; gap: 8px; }
.ed-row2 .ed-input { flex: 1; }
.edit-hint { font-size: 12px; color: var(--text-tertiary); margin: 2px 0 8px; }
.btn.del { background: var(--tint-red); color: #fff; }
.btn.add-loc { display: block; width: 100%; text-align: center; background: var(--bg-grouped); color: var(--text-secondary); border: 1.5px dashed var(--text-tertiary); padding: 13px; border-radius: var(--radius-md); font-size: 14px; font-weight: 600; margin-top: 8px; cursor: pointer; }
.io-row { display: flex; gap: 8px; margin-top: 10px; flex-wrap: wrap; }
.io-row button, .io-row label { flex: 1; min-width: 100px; text-align: center; padding: 10px 6px; border-radius: var(--radius-md); background: var(--bg-elevated); box-shadow: var(--shadow-sm); font-size: 12.5px; font-weight: 600; cursor: pointer; color: var(--text-primary); border: none; display: block; }
</style>
</head>

// ── WGS84 → GCJ02 坐标转换（国内地图必须做这层转换，否则点位会偏移）──
const PI = Math.PI, A_AXIS = 6378245.0, EE = 0.00669342162296594323;
function outOfChina(lng, lat) { return lng < 72.004 || lng > 137.8347 || lat < 0.8293 || lat > 55.8271; }
function transformLat(x, y) {
  let ret = -100.0 + 2.0*x + 3.0*y + 0.2*y*y + 0.1*x*y + 0.2*Math.sqrt(Math.abs(x));
  ret += (20.0*Math.sin(6.0*x*PI) + 20.0*Math.sin(2.0*x*PI)) * 2.0/3.0;
  ret += (20.0*Math.sin(y*PI) + 40.0*Math.sin(y/3.0*PI)) * 2.0/3.0;
  ret += (160.0*Math.sin(y/12.0*PI) + 320*Math.sin(y*PI/30.0)) * 2.0/3.0;
  return ret;
}
function transformLng(x, y) {
  let ret = 300.0 + x + 2.0*y + 0.1*x*x + 0.1*x*y + 0.1*Math.sqrt(Math.abs(x));
  ret += (20.0*Math.sin(6.0*x*PI) + 20.0*Math.sin(2.0*x*PI)) * 2.0/3.0;
  ret += (20.0*Math.sin(x*PI) + 40.0*Math.sin(x/3.0*PI)) * 2.0/3.0;
  ret += (150.0*Math.sin(x/12.0*PI) + 300.0*Math.sin(x/30.0*PI)) * 2.0/3.0;
  return ret;
}
function wgs84ToGcj02(lng, lat) {
  if (outOfChina(lng, lat)) return [lng, lat];
  let dLat = transformLat(lng - 105.0, lat - 35.0);
  let dLng = transformLng(lng - 105.0, lat - 35.0);
  const radLat = lat / 180.0 * PI;
  let magic = Math.sin(radLat);
  magic = 1 - EE * magic * magic;
  const sqrtMagic = Math.sqrt(magic);
  dLat = (dLat * 180.0) / ((A_AXIS * (1 - EE)) / (magic * sqrtMagic) * PI);
  dLng = (dLng * 180.0) / (A_AXIS / sqrtMagic * Math.cos(radLat) * PI);
  return [lng + dLng, lat + dLat];
}
// 返回 AMap 需要的 [lng,lat] 数组（已转 GCJ02）
function gpos(loc) { return wgs84ToGcj02(loc.lng, loc.lat); }
function gposLL(lat, lng) { return wgs84ToGcj02(lng, lat); }
// 拖动图钉时，把地图上的 GCJ02 坐标近似换算回 WGS84（用于保存数据）
function gcj02ToWgs84(lng, lat) {
  if (outOfChina(lng, lat)) return [lng, lat];
  const [glng, glat] = wgs84ToGcj02(lng, lat);
  return [lng - (glng - lng), lat - (glat - lat)];
}

let markers = [], polylines = [], circleOverlays = [];
let locMarker = null, locCircle = null;
const emojis = { food:'🍽️', spot:'📍', hotel:'🏨', transport:'🚃', drink:'🍺' };

function iconHtml(color, emoji) {
  return `<div style="width:28px;height:28px;border-radius:50%;background:${color};border:2.5px solid #fff;display:flex;align-items:center;justify-content:center;font-size:13px;box-shadow:0 2px 8px rgba(0,0,0,.18)">${emoji||''}</div>`;
}
function dotHtml(color) {
  return `<div style="width:10px;height:10px;border-radius:50%;background:${color};border:1.5px solid #fff;box-shadow:0 1px 3px rgba(0,0,0,.25)"></div>`;
}

function clearMap() {
  markers.forEach(m => m.setMap(null));
  polylines.forEach(p => p.setMap(null));
  circleOverlays.forEach(c => c.setMap(null));
  markers = []; polylines = []; circleOverlays = [];
}

function initMap() {
  try {
    const center = HOTEL.lat ? gpos(HOTEL) : gposLL(39.90, 116.40);
    map = new AMap.Map('map', { zoom: 11, center: center, resizeEnable: true });
    try { map.addControl(new AMap.ToolBar({ position: 'RT' })); } catch(e) {}
    if (HOTEL.lat) {
      const hm = new AMap.Marker({ position: gpos(HOTEL), content: iconHtml('#ff9500','🏨'), offset: new AMap.Pixel(-14,-14), zIndex: 200, map: map });
      const iw = new AMap.InfoWindow({ content: `<b>${HOTEL.name}</b>`, offset: new AMap.Pixel(0,-18) });
      hm.on('click', () => iw.open(map, hm.getPosition()));
    }
    mapReady = true;
    go(0);
  } catch (e) {
    showMapFail();
    console.error(e);
  }
}

function showDay(idx) {
  if (!mapReady) return;
  clearMap();
  if (idx === 0) {
    const pts = [];
    DAYS.forEach(d => d.locations.forEach(l => { if (l.lat) pts.push(gposLL(l.lat, l.lng)); }));
    DAYS.slice(1).forEach(d => {
      d.locations.filter(l => l.time !== '—').forEach(l => {
        const p = gposLL(l.lat, l.lng);
        const m = new AMap.Marker({ position: p, content: dotHtml(d.color), offset: new AMap.Pixel(-5,-5), map: map });
        const iw = new AMap.InfoWindow({ content: `<b>${l.name}</b><br><span style="color:#86868b">${d.label}</span>`, offset: new AMap.Pixel(0,-10) });
        m.on('click', () => iw.open(map, m.getPosition()));
        markers.push(m);
      });
    });
    if (pts.length) { try { map.setFitView(null, false, [30,30,30,30]); } catch(e) { if(pts.length) map.setCenter(pts[0]); } }
    return;
  }
  const day = DAYS.find(d => d.id === idx);
  if (!day) return;
  const coords = [];
  day.locations.forEach((l, li) => {
    if (!l.lat) return;
    const p = gposLL(l.lat, l.lng);
    const m = new AMap.Marker({ position: p, content: iconHtml(day.color, emojis[l.type]||'📌'), offset: new AMap.Pixel(-14,-14), map: map, draggable: editMode, cursor: editMode ? 'move' : 'pointer' });
    if (editMode) {
      m.on('dragend', () => {
        const np = m.getPosition();
        const [wlng, wlat] = gcj02ToWgs84(np.getLng(), np.getLat());
        updateLocPos(day.id, li, wlat, wlng);
      });
    } else {
      const safeName = l.name.replace(/'/g, "\\'");
      const html = `<b>${l.name}</b>${l.time!=='—'?'<br><span style="color:#86868b">'+l.time+'</span>':''}<br>${l.desc}${l.budget?'<br><span style="color:#ff9500">'+l.budget+'</span>':''}<br><a href="#" onclick="event.preventDefault();openAS('${safeName}',${l.lat},${l.lng})">📍 导航</a>`;
      const iw = new AMap.InfoWindow({ content: html, offset: new AMap.Pixel(0,-18) });
      m.on('click', () => iw.open(map, m.getPosition()));
    }
    markers.push(m);
    if (l.time !== '—') coords.push(p);
  });
  if (coords.length > 1) {
    const pl = new AMap.Polyline({ path: coords, strokeColor: day.color, strokeWeight: 2.5, strokeOpacity: .5, strokeStyle: 'dashed', map: map });
    polylines.push(pl);
  }
  if (coords.length) { try { map.setFitView(markers, false, [40,40,40,40]); } catch(e) { map.setCenter(coords[0]); } }
}

/* ── 我的位置 ── */
document.getElementById('locateBtn').addEventListener('click', function() {
  if (!mapReady || !navigator.geolocation) return;
  this.classList.add('active');
  navigator.geolocation.getCurrentPosition(posData => {
    const { latitude, longitude, accuracy } = posData.coords;
    const ll = gposLL(latitude, longitude);
    if (locMarker) {
      locMarker.setPosition(ll);
      locCircle.setCenter(ll); locCircle.setRadius(Math.max(accuracy/2, 20));
    } else {
      locMarker = new AMap.Marker({
        position: ll,
        content: '<div style="width:14px;height:14px;border-radius:50%;background:#007aff;border:2.5px solid #fff;box-shadow:0 0 6px rgba(0,122,255,.5)"></div>',
        offset: new AMap.Pixel(-7,-7), zIndex: 300, map: map
      });
      locCircle = new AMap.Circle({ center: ll, radius: Math.max(accuracy/2, 20), strokeColor:'#007aff', strokeWeight:1, fillColor:'#007aff', fillOpacity:.08, map: map });
    }
    map.setZoomAndCenter(15, ll);
  }, () => {}, { enableHighAccuracy: true, timeout: 10000 });
});

}

function xhsWebUrl(loc) { return `https://www.xiaohongshu.com/search_result?keyword=${encodeURIComponent(xhsKeyword(loc))}&source=web_explore_feed`; }

function openExt(dayIdx, locIdx, kind) {

function openDp(dayIdx, locIdx) { return openExt(dayIdx, locIdx, 'dp'); }

function escAttr(s) { return String(s==null?'':s).replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/</g,'&lt;'); }
function escHtml(s) { return String(s==null?'':s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

function locCard(loc, dayIdx, locIdx) {
  const dot = loc.type==='food'?'food':loc.type==='spot'?'spot':loc.type==='drink'?'drink':loc.type==='hotel'?'hotel':'transport';
  const bdg = loc.type==='food'?'<span class="badge food">餐</span>':loc.type==='spot'?'<span class="badge spot">景</span>':loc.type==='hotel'?'<span class="badge hotel">住</span>':'';
  const uid = `d${dayIdx}-${locIdx}`;
  let lnk = `<button class="btn nav" onclick="openAS('${loc.name.replace(/'/g,"\\'")}',${loc.lat},${loc.lng})">📍 导航</button>`;
  if (loc.xhs || loc.xhsKeyword) {
    const xhsHref = IN_APP_WEBVIEW ? xhsWebUrl(loc) : xhsAppUrl(loc);
    const xhsLabel = IN_APP_WEBVIEW ? '📕 小红书' : '📕 小红书 App';
    lnk += `<a href="${xhsHref}" onclick="return openXhs(${dayIdx},${locIdx})" class="btn xhs">${xhsLabel}</a>`;
  }
  const dpEnabled = loc.dianping !== false && (loc.dianping || loc.dianpingKeyword || loc.type==='food' || loc.type==='drink');
  if (dpEnabled) {
    const dpHref = IN_APP_WEBVIEW ? dpWebUrl(loc) : dpAppUrl(loc);
    const dpLabel = IN_APP_WEBVIEW ? '🍜 大众点评' : '🍜 大众点评 App';
    lnk += `<a href="${dpHref}" onclick="return openDp(${dayIdx},${locIdx})" class="btn dp">${dpLabel}</a>`;
  }
  if (loc.reserve) lnk += `<a href="${loc.reserve}" target="_blank" class="btn rsv">📅 预约</a>`;
  return `<div class="tl-item"><div class="tl-dot ${dot}"></div><div class="card" onclick="if(!event.target.closest('.btn,.links'))toggle('${uid}')"><div class="time">${loc.time!=='—'?loc.time:'备选'}</div><div class="name">${bdg} ${loc.name}</div><div class="desc">${loc.desc}</div>${loc.budget?'<div class="budget">'+loc.budget+'</div>':''}<div class="links">${lnk}</div>${loc.detail?'<div class="details" id="'+uid+'">'+loc.detail.replace(/\n/g,'<br>')+'</div>':''}</div></div>`;
}

function locCardEdit(loc, dayIdx, locIdx) {
  const dot = loc.type==='food'?'food':loc.type==='spot'?'spot':loc.type==='drink'?'drink':loc.type==='hotel'?'hotel':'transport';
  return `<div class="tl-item"><div class="tl-dot ${dot}"></div><div class="card edit-card">
    <div class="ed-row2">
      <input class="ed-input" style="max-width:90px" value="${escAttr(loc.time)}" placeholder="时间/—" onchange="updateLoc(${dayIdx},${locIdx},'time',this.value)">
      <select class="ed-input" style="max-width:100px" onchange="updateLoc(${dayIdx},${locIdx},'type',this.value)">
        <option value="spot" ${loc.type==='spot'?'selected':''}>📍景点</option>
        <option value="food" ${loc.type==='food'?'selected':''}>🍽️餐厅</option>
        <option value="hotel" ${loc.type==='hotel'?'selected':''}>🏨住宿</option>
        <option value="drink" ${loc.type==='drink'?'selected':''}>🍺饮品</option>
      </select>
    </div>
    <div class="edit-row"><input class="ed-input" value="${escAttr(loc.name)}" placeholder="名称" onchange="updateLoc(${dayIdx},${locIdx},'name',this.value)"></div>
    <div class="edit-row"><textarea class="ed-input" placeholder="描述" onchange="updateLoc(${dayIdx},${locIdx},'desc',this.value)">${escHtml(loc.desc||'')}</textarea></div>
    <div class="edit-row"><input class="ed-input" value="${escAttr(loc.budget||'')}" placeholder="预算，如 ¥100/人" onchange="updateLoc(${dayIdx},${locIdx},'budget',this.value)"></div>
    <div class="edit-hint">💡 想换地方：直接拖动地图上对应这张卡片的图钉</div>
    <button class="btn del" onclick="deleteLoc(${dayIdx},${locIdx})">🗑 删除这个地点</button>
  </div></div>`;
}

function renderDay(idx) {
  const d = DAYS.find(x => x.id === idx); if (!d) return '';
  let h = `<div class="day-head"><h2>${d.title}</h2><p>${d.date}</p></div>`;
  const mainIdx = [], altIdx = [];
  d.locations.forEach((l,i) => (l.time!=='—' ? mainIdx : altIdx).push(i));
  if (mainIdx.length) { h += '<div class="section-head">行程</div><div class="timeline">'; mainIdx.forEach(i => h += locCard(d.locations[i], idx, i)); h += '</div>'; }
  if (altIdx.length) { h += '<div class="section-head">备选</div><div class="timeline">'; altIdx.forEach(i => h += locCard(d.locations[i], idx, i)); h += '</div>'; }
  return h;
}

function renderDayEdit(idx) {
  const d = DAYS.find(x => x.id === idx); if (!d) return '';
  let h = `<div class="day-head edit-day-head">
    <input class="ed-input" value="${escAttr(d.title||'')}" placeholder="这天的主题" onchange="updateDay(${idx},'title',this.value)">
    <input class="ed-input" value="${escAttr(d.date||'')}" placeholder="日期说明，如 7月8日 周三" onchange="updateDay(${idx},'date',this.value)">
  </div>`;
  h += '<div class="edit-banner">✏️ 编辑模式开启中。改完时间/预算/描述，点别处自动保存；拖地图上的图钉能挪地方。这些修改只存在这台设备里，记得在「总览」页底部导出文件发给对象。</div>';
  h += '<div class="section-head">这天的地点（按顺序）</div><div class="timeline">';
  d.locations.forEach((l, li) => h += locCardEdit(l, idx, li));
  h += '</div>';
  h += `<button class="btn add-loc" onclick="addLoc(${idx})">＋ 添加新地点</button>`;
  return h;
}

// ══════════ NAV ══════════
let cur = 0;
const tabsEl = document.getElementById('tabs');
const contentEl = document.getElementById('content');

function buildTabs() {
  tabsEl.innerHTML = '';
  DAYS.forEach(d => {
    const btn = document.createElement('button');
    btn.className = 'tab' + (d.id===cur?' active':'');
    btn.dataset.day = d.id;
    btn.textContent = d.label;
    tabsEl.appendChild(btn);
  });
  const editBtn = document.createElement('button');
  editBtn.className = 'tab edit-toggle' + (editMode?' active':'');
  editBtn.id = 'editBtn';
  editBtn.textContent = editMode ? '✅ 完成编辑' : '✏️ 编辑';
  editBtn.onclick = toggleEdit;
  tabsEl.appendChild(editBtn);
}
buildTabs();

function go(idx) {
  cur = idx;
  tabsEl.querySelectorAll('.tab').forEach(t => { if (t.dataset.day !== undefined) t.classList.toggle('active', +t.dataset.day===idx); });
  contentEl.innerHTML = idx===0 ? overviewContent() : (editMode ? renderDayEdit(idx) : renderDay(idx));
  showDay(idx);
  contentEl.scrollTo({top:0});
  const tab = tabsEl.querySelector(`[data-day="${idx}"]`);
  if (tab) tab.scrollIntoView({behavior:'smooth', inline:'center', block:'nearest'});
}
// 编辑数据变化后用这个：不跳回顶部、不改 tab 高亮，只刷新当前页内容和地图
function rerenderCurrent() {
  const st = contentEl.scrollTop;
  contentEl.innerHTML = cur===0 ? overviewContent() : (editMode ? renderDayEdit(cur) : renderDay(cur));
  showDay(cur);
  contentEl.scrollTop = st;
}
function toggleEdit() {
  editMode = !editMode;
  buildTabs();
  rerenderCurrent();
}
function toggle(id) { const el=document.getElementById(id); if (el) el.classList.toggle('closed'); }
tabsEl.addEventListener('click', e => { const t=e.target.closest('.tab'); if (t && t.id!=='editBtn' && t.dataset.day!==undefined) go(+t.dataset.day); });
// 先渲染一次内容区（地图还没加载完时文字先出来）
contentEl.innerHTML = overviewContent();

// ══════════ 数据增删改 ══════════
function updateLoc(dayIdx, locIdx, field, value) {
  const day = DAYS.find(d => d.id === dayIdx); if (!day) return;
  const loc = day.locations[locIdx]; if (!loc) return;
  loc[field] = value;
  saveData();
  rerenderCurrent();
}
function updateLocPos(dayIdx, locIdx, lat, lng) {
  const day = DAYS.find(d => d.id === dayIdx); if (!day) return;
  const loc = day.locations[locIdx]; if (!loc) return;
  loc.lat = lat; loc.lng = lng;
  saveData();
  rerenderCurrent();
}
function deleteLoc(dayIdx, locIdx) {
  const day = DAYS.find(d => d.id === dayIdx); if (!day) return;
  if (!confirm('确定删除这个地点吗？')) return;
  day.locations.splice(locIdx, 1);
  saveData();
  rerenderCurrent();
}
function addLoc(dayIdx) {
  const day = DAYS.find(d => d.id === dayIdx); if (!day) return;
  const base = day.locations[0] || HOTEL;
  day.locations.push({ name: '新地点', lat: base.lat, lng: base.lng, type: 'spot', time: '—', desc: '点这里改描述' });
  saveData();
  rerenderCurrent();
}
function updateDay(dayIdx, field, value) {
  const day = DAYS.find(d => d.id === dayIdx); if (!day) return;
  day[field] = value;
  saveData();
  if (field === 'label') buildTabs();
  rerenderCurrent();
}
function exportData() {
  const blob = new Blob([JSON.stringify(DAYS, null, 2)], { type: 'application/json' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = 'beijing-trip-data.json';
  document.body.appendChild(a); a.click(); document.body.removeChild(a);
  URL.revokeObjectURL(url);
}
function importData(evt) {
  const file = evt.target.files[0]; if (!file) return;
  const reader = new FileReader();
  reader.onload = () => {
    try {
      const parsed = JSON.parse(reader.result);
      if (!Array.isArray(parsed) || !parsed.length) throw new Error('格式不对');
      DAYS = parsed;
      saveData();
      cur = 0;
      buildTabs();
      go(0);
      alert('导入成功！');
    } catch (e) {
      alert('这个文件读不懂，确认一下是不是之前导出的那个 json 文件。');
    }
  };
  reader.readAsText(file);
  evt.target.value = '';
}
function resetData() {
  if (!confirm('确定要恢复成最初的默认行程吗？你在这台设备上改过的内容会被清空。')) return;
  DAYS = cloneDefault();
  saveData();
  cur = 0;
  buildTabs();
  go(0);
}

/* ── Action Sheet for Navigation ── */
const asOverlay = document.createElement('div');
asOverlay.className = 'as-overlay';
asOverlay.innerHTML = `<div class="as-sheet">
  <div class="as-group" id="as-opts"></div>
  <div class="as-group"><button class="as-item as-cancel" onclick="closeAS()">取消</button></div>
</div>`;
document.body.appendChild(asOverlay);
asOverlay.addEventListener('click', e => { if (e.target === asOverlay) closeAS(); });

const IS_IOS = /iPad|iPhone|iPod/.test(navigator.userAgent);
function amapAppUrl(name, lat, lng) {
  const [glng, glat] = gposLL(lat, lng);
  const scheme = IS_IOS ? 'iosamap' : 'androidamap';
  return `${scheme}://viewMap?sourceApplication=trip&poiname=${encodeURIComponent(name)}&lat=${glat}&lon=${glng}&dev=0`;
}
function amapWebUrl(name, lat, lng) {
  const [glng, glat] = gposLL(lat, lng);
  return `https://uri.amap.com/marker?position=${glng},${glat}&name=${encodeURIComponent(name)}&src=trip&coordinate=gaode&callnative=1`;
}
function openAmap(name, lat, lng) {
  if (IN_APP_WEBVIEW) { window.open(amapWebUrl(name, lat, lng)); return; }
  window.location.href = amapAppUrl(name, lat, lng);
}
function openAS(name, lat, lng) {
  const q = encodeURIComponent(name + ' Beijing');
  const encName = encodeURIComponent(name);
  const safeName = name.replace(/'/g,"\\'");
  const appleUrl = IN_APP_WEBVIEW
    ? `https://maps.apple.com/?q=${lat},${lng}&ll=${lat},${lng}&name=${encName}`
    : `maps://maps.apple.com/?q=${lat},${lng}&name=${encName}`;
  const googleUrl = `https://www.google.com/maps/search/?api=1&query=${q}`;
  document.getElementById('as-opts').innerHTML =
    `<button class="as-item" onclick="openAmap('${safeName}',${lat},${lng});closeAS()">🧭 高德地图 App</button>` +
    `<button class="as-item" onclick="window.open('${appleUrl}');closeAS()">🍎 Apple Maps</button>` +
    `<button class="as-item" onclick="window.open('${googleUrl}');closeAS()">🗺️ Google Maps</button>`;
  asOverlay.classList.add('show');
}
function closeAS() { asOverlay.classList.remove('show'); }

// 启动：加载高德地图 JS SDK
loadAMapScript(initMap);
</script>
